unbind r
bind r source-file ~/.tmux.conf

# Enable mouse support
set -g mouse on
set -ga terminal-features "*:hyperlinks"

set -g default-terminal "xterm-256color"
set -g prefix C-b
set -g base-index 1
set -g renumber-windows on

# Plugins
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tpm'

# Auto-save/restore sessions
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'


# Status bar
set -g status-position bottom
set -g status-justify centre

# Configure the catppuccin plugin
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# Load catppuccin
run ~/.tmux/plugins/tmux/catppuccin.tmux

# Session name with rounded corners, red when prefix active
set -g status-left "#[fg=#{?client_prefix,#{@thm_red},#{@thm_overlay_0}},bg=default]#[fg=#{@thm_fg},bg=#{?client_prefix,#{@thm_red},#{@thm_overlay_0}}] #S #[fg=#{?client_prefix,#{@thm_red},#{@thm_overlay_0}},bg=default]"
set -g status-left-length 50
set -g status-right ""

# Use login shell (ensures .zshrc is sourced for fnm, etc.)
set -g default-command "zsh -l"

# Split panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Cmd+K clear screen + scrollback (via Ghostty keybind)
bind k send-keys -R \; clear-history

run '~/.config/tmux/plugins/tpm/tpm'

set -g allow-rename off
set -g automatic-rename off
